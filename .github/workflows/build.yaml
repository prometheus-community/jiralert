name: Build
on:
  push:
    branches: 
    - main
    - 'feat/*'
    tags:
    - 'v*'
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs: 
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from semver.sh
        id: version
        run: |
          VERSION=$(curl -sSL "https://raw.githubusercontent.com/metraction/github-actions/refs/heads/main/scripts/semver.sh" | bash)
          VERSION=$(echo "$VERSION" | sed 's/+/_/g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
  build-docker:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      # - name: Checkout code
      #   uses: actions/checkout@v4
      #   with:
      #     fetch-depth: 0

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/enpace/jiralert:${{ needs.get-version.outputs.version }}

  # push-helm-chart:
  #   uses: metraction/github-actions/.github/workflows/helm-push.yaml@main
  #   needs: [build-docker]
  #   with:
  #     chart_dir: helm/recipe-creator
  #     chart_name: recipe-creator
  #     destination: .
  #     registry: oci://ghcr.io/enpace/charts
  #   secrets: inherit
  
  delete_versions:
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - name: Delete all untagged container versions
        uses: actions/delete-package-versions@v5
        with:
          delete-only-untagged-versions: 'false'
          min-versions-to-keep: 10
          package-name: jiralert
          package-type: container
          token: ${{ secrets.GITHUB_TOKEN }}